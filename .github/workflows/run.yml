name: Run Foodsharing Script

on:
  schedule:
    - cron: "0 3 1 * *"   # jeden Monat am 1. um 03:00
  workflow_dispatch:       # manueller Start möglich

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Playwright
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Create auth.json
        run: |
          echo '${{ secrets.AUTH_JSON }}' > auth.json

      - name: Run script
        run: python fs2.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/**/*.json

      - name: Commit results to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
  
          # Ordner erstellen, falls nicht vorhanden
          mkdir -p data
  
          # Ergebnisse in den data-Ordner kopieren
          cp -r output/* data/
  
            # Änderungen committen, falls es welche gibt
          git add data || true
          if ! git diff --cached --quiet; then
            git commit -m "Automated data update for ${{ github.run_id }}"
            git push
          else
            echo "Keine Änderungen zum Commit."
          fi

